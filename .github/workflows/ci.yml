name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

# 同じPRで古いCI実行をキャンセル
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-check:
    name: 品質チェック（型チェック・テスト・ビルド）
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: pnpm をセットアップ
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: 依存関係をインストール（ロックファイル固定）
        run: pnpm install --frozen-lockfile

      - name: 問題データを検証
        run: pnpm validate:questions

      - name: 型チェック (astro check)
        run: pnpm check

      - name: ユニットテスト (vitest)
        run: pnpm test

      - name: ビルド (astro build)
        run: pnpm build
